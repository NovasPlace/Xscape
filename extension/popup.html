<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Xscape</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<main>
  <header>
    <div><b>✦ Xscape</b><small>Community Name FX · v0.7.0</small></div>
    <label class="switch" title="Enable Xscape"><input id="enabled" type="checkbox"><span></span></label>
  </header>

  <section class="preview">
    <small>LIVE PREVIEW</small>
    <strong id="preview">NovasPlace</strong>
    <em id="previewHandle">@novasplace</em>
  </section>

  <nav>
    <button class="tab active" data-tab="style">Style</button>
    <button class="tab" data-tab="community">Community</button>
    <button class="tab" data-tab="interface">Popup</button>
    <button class="tab overlayTab" data-tab="overlay">X Overlay</button>
  </nav>

  <section id="style" class="pane active">
    <label>Handle<input id="handle" maxlength="15" placeholder="NovasPlace"></label>
    <label>Preset<select id="preset">
      <option value="custom">Custom</option>
      <option value="rune-surge">✦ Rune Surge</option>
      <option value="party-hat">🎉 Party Hat</option>
      <option value="ice-barrage">❄ Ice Barrage</option>
      <option value="toxic-pk">☣ Toxic PK</option>
      <option value="infernal-cape">🔥 Infernal Cape</option>
      <option value="void-pulse">◉ Void Pulse</option>
      <option value="ancient-glow">✧ Ancient Glow</option>
    </select></label>
    <div class="row">
      <label>Effect<select id="effect">
        <option value="wave">Wave</option><option value="rainbow">Rainbow</option>
        <option value="flash">Flash</option><option value="glow">Glow</option>
        <option value="gradient">Gradient</option><option value="pulse">Pulse</option>
        <option value="fire">Fire</option><option value="ice">Ice</option>
        <option value="toxic">Toxic</option><option value="solid">Solid</option>
      </select></label>
      <button id="usePage" class="small">Use page</button>
    </div>
    <div class="row colors"><label>Color 1<input id="color1" type="color"></label><label>Color 2<input id="color2" type="color"></label></div>
    <label>Speed <output id="speedOut"></output><input id="speed" type="range" min=".25" max="4" step=".01"></label>
    <label>Intensity <output id="intensityOut"></output><input id="intensity" type="range" min=".1" max="1" step=".05"></label>
    <div class="buttons"><button id="save" class="primary">Save style</button><button id="remove">Remove</button></div>
    <label class="toggleLine"><span><b>Grand Exchange mode</b><small>Apply one effect to every visible profile.</small></span><input id="demoMode" type="checkbox"></label>
    <label class="toggleLine"><span><b>Party Shuffle</b><small>Give every unthemed handle its own stable random animation.</small></span><input id="shuffleMode" type="checkbox"></label>
    <div class="buttons"><button id="rerollShuffle">🎲 Reroll profile styles</button></div>
  </section>

  <section id="community" class="pane">
    <label class="toggleLine noTop"><span><b>Community Sync</b><small>Show themes published in the GitHub registry.</small></span><input id="communityEnabled" type="checkbox"></label>
    <label>Registry URL<textarea id="registryUrl" rows="3"></textarea></label>
    <div class="buttons"><button id="saveRegistry" class="primary">Save registry</button><button id="refresh">Refresh now</button></div>
    <div id="registryStatus" class="statusBox">Not synced yet.</div>
    <div class="buttons"><button id="copyTheme">Copy theme JSON</button><button id="openRegistry">Open registry</button></div>
    <label>Muted handles<input id="mutedHandles" placeholder="spam, anotherhandle"></label>
    <label>Muted effects<input id="mutedEffects" placeholder="flash, toxic"></label>
    <button id="saveMutes">Save mutes</button>
  </section>

  <section id="interface" class="pane">
    <label>Popup skin<select id="uiTheme">
      <option value="neon-rune">✦ Neon Rune</option>
      <option value="grand-exchange">🪙 Grand Exchange</option>
      <option value="void">◉ Void</option>
      <option value="frozen">❄ Frozen</option>
      <option value="inferno">🔥 Inferno</option>
      <option value="toxic">☣ Toxic</option>
      <option value="party">🎉 Party</option>
      <option value="custom">🎨 Custom</option>
    </select></label>

    <div class="skinGrid" aria-label="Popup skin shortcuts">
      <button data-ui-theme="neon-rune" title="Neon Rune"><i></i><span>Rune</span></button>
      <button data-ui-theme="grand-exchange" title="Grand Exchange"><i></i><span>GE</span></button>
      <button data-ui-theme="void" title="Void"><i></i><span>Void</span></button>
      <button data-ui-theme="frozen" title="Frozen"><i></i><span>Ice</span></button>
      <button data-ui-theme="inferno" title="Inferno"><i></i><span>Fire</span></button>
      <button data-ui-theme="toxic" title="Toxic"><i></i><span>Toxic</span></button>
      <button data-ui-theme="party" title="Party"><i></i><span>Party</span></button>
    </div>

    <div class="row colors"><label>Accent 1<input id="uiAccent1" type="color"></label><label>Accent 2<input id="uiAccent2" type="color"></label></div>
    <label class="toggleLine"><span><b>Glass panels</b><small>Blurred translucent cards and controls.</small></span><input id="uiGlass" type="checkbox"></label>
    <label class="toggleLine"><span><b>Compact mode</b><small>Smaller popup with tighter spacing.</small></span><input id="uiCompact" type="checkbox"></label>
    <label class="toggleLine"><span><b>Animated backdrop</b><small>Slow-moving ambient color behind the UI.</small></span><input id="uiMotion" type="checkbox"></label>
    <div class="buttons interfaceActions"><button id="saveInterface" class="primary">Save popup</button><button id="resetInterface">Reset</button></div>
  </section>

  <section id="overlay" class="pane">
    <div class="overlayHero">
      <span class="overlayRune">✦</span>
      <div><b>Full X Overlay</b><small>Reskin the entire site locally.</small></div>
      <label class="switch" title="Enable full X overlay"><input id="overlayEnabled" type="checkbox"><span></span></label>
    </div>

    <label>Site skin<select id="overlayTheme">
      <option value="neon-rune">✦ Neon Rune</option>
      <option value="grand-exchange">🪙 Grand Exchange</option>
      <option value="void">◉ Void</option>
      <option value="frozen">❄ Frozen</option>
      <option value="inferno">🔥 Inferno</option>
      <option value="toxic">☣ Toxic</option>
      <option value="party">🎉 Party</option>
      <option value="custom">🎨 Custom</option>
    </select></label>

    <div class="skinGrid overlaySkins" aria-label="X overlay skin shortcuts">
      <button data-overlay-theme="neon-rune" title="Neon Rune"><i></i><span>Rune</span></button>
      <button data-overlay-theme="grand-exchange" title="Grand Exchange"><i></i><span>GE</span></button>
      <button data-overlay-theme="void" title="Void"><i></i><span>Void</span></button>
      <button data-overlay-theme="frozen" title="Frozen"><i></i><span>Ice</span></button>
      <button data-overlay-theme="inferno" title="Inferno"><i></i><span>Fire</span></button>
      <button data-overlay-theme="toxic" title="Toxic"><i></i><span>Toxic</span></button>
      <button data-overlay-theme="party" title="Party"><i></i><span>Party</span></button>
    </div>

    <div class="row colors"><label>Accent 1<input id="overlayAccent1" type="color"></label><label>Accent 2<input id="overlayAccent2" type="color"></label></div>

    <div class="overlayOptions">
      <label class="toggleLine noTop"><span><b>Glass timeline</b><small>Blurred navigation, cards, menus, and composer.</small></span><input id="overlayGlass" type="checkbox"></label>
      <label class="toggleLine"><span><b>Compact timeline</b><small>Tighter cards and less wasted vertical space.</small></span><input id="overlayCompact" type="checkbox"></label>
      <label class="toggleLine"><span><b>Hide right sidebar</b><small>Remove search, trends, and recommendations column.</small></span><input id="overlayHideRight" type="checkbox"></label>
      <label class="toggleLine"><span><b>Hide discovery clutter</b><small>Remove trends and Who to follow modules.</small></span><input id="overlayHideTrends" type="checkbox"></label>
      <label class="toggleLine"><span><b>Hide promoted posts</b><small>Remove detected promoted timeline cells.</small></span><input id="overlayHideAds" type="checkbox"></label>
      <label class="toggleLine"><span><b>Dim timeline media</b><small>Fade images and video until the post is hovered.</small></span><input id="overlayDimMedia" type="checkbox"></label>
      <label class="toggleLine"><span><b>Rounded media</b><small>Round avatars, images, and video into game-like cards.</small></span><input id="overlayRoundMedia" type="checkbox"></label>
    </div>

    <div class="overlayHint">Changes apply only in your browser and update open X tabs immediately.</div>
    <div class="buttons interfaceActions"><button id="applyOverlay" class="primary">Apply overlay</button><button id="resetOverlay">Reset</button></div>
  </section>

  <p id="status"></p>
</main>
<script type="module" src="popup.js"></script>
<script type="module" src="overlay-popup.js"></script>
</body>
</html>
