name: Package extension release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build extension ZIP
        run: cd extension && zip -r "../xscape-extension-${GITHUB_REF_NAME}.zip" .
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" "xscape-extension-${GITHUB_REF_NAME}.zip" --generate-notes
